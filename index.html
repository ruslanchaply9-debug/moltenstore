<script>
/**
 * API SERVICE (REAL BACKEND INTEGRATION)
 * Replaces localStorage with Fetch API calls
 */
const Api = {
    _token: null, // JWT stored in memory for security (simulated)
    _user: null,

    get headers() {
        const headers = { 'Content-Type': 'application/json' };
        if (this._token) headers['Authorization'] = `Bearer ${this._token}`;
        return headers;
    },

    async handleResponse(response) {
        const data = await response.json();
        if (!response.ok) throw new Error(data.message || 'Ошибка сервера');
        return data;
    },

    async login(email, password) {
        const response = await fetch('/api/login', {
            method: 'POST',
            headers: this.headers,
            body: JSON.stringify({ email, password })
        });
        const data = await this.handleResponse(response);
        this._token = data.token;
        this._user = data.user;
        return data;
    },

    async register(email, password) {
        const response = await fetch('/api/register', {
            method: 'POST',
            headers: this.headers,
            body: JSON.stringify({ email, password })
        });
        const data = await this.handleResponse(response);
        this._token = data.token;
        this._user = data.user;
        return data;
    },

    async createOrder(orderData) {
        const response = await fetch('/api/orders', {
            method: 'POST',
            headers: this.headers,
            body: JSON.stringify(orderData)
        });
        return await this.handleResponse(response);
    },

    async getMyOrders() {
        const response = await fetch('/api/orders', {
            method: 'GET',
            headers: this.headers
        });
        return await this.handleResponse(response);
    },

    async getAllOrders() {
        // Admin check should happen on server, but UI also respects role
        const response = await fetch('/api/admin/orders', {
            method: 'GET',
            headers: this.headers
        });
        return await this.handleResponse(response);
    },

    async getReviews() {
        const response = await fetch('/api/reviews', {
            method: 'GET',
            headers: this.headers
        });
        return await this.handleResponse(response);
    },

    async postReview(content, rating) {
        const response = await fetch('/api/reviews', {
            method: 'POST',
            headers: this.headers,
            body: JSON.stringify({ content, rating })
        });
        return await this.handleResponse(response);
    }
};

/**
 * SPA ROUTER & UI ENGINE
 */
const router = {
    selectedProduct: null,
    catalog: {
        gems: [
            { id: 'g30', amount: 30, price: '2.49', img: 'images/gems_sm.webp' },
            { id: 'g80', amount: 80, price: '5.99', img: 'images/gems_sm.webp' },
            { id: 'g170', amount: 170, price: '11.99', img: 'images/gems_md.webp' },
            { id: 'g360', amount: 360, price: '23.99', img: 'images/gems_md.webp' },
            { id: 'g950', amount: 950, price: '59.99', img: 'images/gems_lg.webp' },
            { id: 'g2000', amount: 2000, price: '119.99', img: 'images/gems_lg.webp' }
        ]
    },

    init() {
        document.getElementById('footer-year').textContent = new Date().getFullYear();
        this.updateNav();
        this.navigate('home');
    },

    updateNav() {
        const navAuth = document.getElementById('nav-auth-section');
        if (!navAuth) return;
        
        if (Api._user) {
            const isAdmin = Api._user.role === 'admin';
            navAuth.innerHTML = `
                <div class="flex items-center space-x-2 md:space-x-3">
                    <div class="hidden sm:flex flex-col items-end mr-2 text-right">
                        <span class="text-[9px] font-black text-slate-400 uppercase tracking-wider">${isAdmin ? 'Администратор' : 'Клиент'}</span>
                        <span class="text-sm font-bold text-slate-700 truncate max-w-[120px]">${Api._user.email.split('@')[0]}</span>
                    </div>
                    <button onclick="router.navigate('${isAdmin ? 'admin' : 'cabinet'}')" class="${isAdmin ? 'bg-indigo-600 text-white' : 'bg-purple-100 text-purple-700'} px-4 py-2 rounded-xl font-bold hover:opacity-90 transition shadow-sm text-sm">
                        ${isAdmin ? '<i class="fa-solid fa-lock-open mr-2"></i>Панель' : 'Кабинет'}
                    </button>
                    <button onclick="router.logout()" class="w-10 h-10 flex items-center justify-center text-slate-400 hover:text-red-500 hover:bg-red-50 rounded-xl transition" title="Выйти">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            `;
        } else {
            navAuth.innerHTML = `
                <button onclick="router.navigate('login')" class="bg-gradient-to-r from-purple-600 to-blue-600 text-white px-6 md:px-8 py-2.5 rounded-xl font-bold hover:shadow-lg hover:scale-105 transition transform active:scale-95 shadow-md">Войти</button>
            `;
        }
    },

    async navigate(view, anchor = null) {
        const container = document.getElementById('view-container');
        container.classList.add('page-transitioning');
        
        setTimeout(async () => {
            try {
                switch(view) {
                    case 'home': await this.renderHome(); break;
                    case 'login': this.renderAuth('login'); break;
                    case 'register': this.renderAuth('register'); break;
                    case 'checkout': this.renderCheckout(); break;
                    case 'cabinet': await this.renderCabinet(); break;
                    case 'admin': await this.renderAdmin(); break;
                    default: await this.renderHome();
                }

                container.classList.remove('page-transitioning');
                
                if (anchor) {
                    const el = document.getElementById(anchor);
                    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                } else {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            } catch (err) {
                console.error('Navigation error:', err);
                this.renderHome();
            }
        }, 300);
    },

    logout() {
        Api._token = null;
        Api._user = null;
        this.updateNav();
        this.navigate('home');
    },

    async renderHome() {
        const container = document.getElementById('view-container');
        
        // Fetch real reviews
        let reviewsHtml = '';
        try {
            const reviews = await Api.getReviews();
            reviewsHtml = reviews.slice(0, 3).map(r => `
                <div class="bg-white p-10 rounded-[2.5rem] shadow-sm border border-slate-100">
                    <div class="flex space-x-1 text-yellow-400 mb-6">
                        ${Array(r.rating).fill('<i class="fa-solid fa-star"></i>').join('')}
                    </div>
                    <p class="text-slate-600 font-medium mb-10 italic leading-relaxed">"${r.content}"</p>
                    <div class="flex items-center space-x-4 border-t border-slate-50 pt-6">
                        <div class="w-12 h-12 rounded-2xl bg-indigo-100 flex items-center justify-center text-indigo-600 font-black text-lg">
                            ${r.username.charAt(0).toUpperCase()}
                        </div>
                        <div>
                            <h4 class="font-black text-slate-900">${r.username}</h4>
                            <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Игрок • ${r.date}</p>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (e) {
            reviewsHtml = '<p class="col-span-3 text-slate-400">Отзывы временно недоступны</p>';
        }

        container.innerHTML = `
            <section class="relative overflow-hidden py-16 md:py-32 px-4 bg-white">
                <div class="max-w-7xl mx-auto flex flex-col lg:flex-row items-center justify-between relative z-10">
                    <div class="lg:w-1/2 mb-16 lg:mb-0 text-center lg:text-left">
                        <span class="inline-block py-1.5 px-4 rounded-full bg-purple-100 text-purple-700 font-bold text-[10px] uppercase tracking-[0.2em] mb-8 border border-purple-200">Официальный партнер 2026</span>
                        <h1 class="text-5xl lg:text-8xl font-black text-slate-900 leading-[1] mb-8">
                            Твой Путь к <span class="text-transparent bg-clip-text bg-gradient-to-r from-purple-600 to-blue-500">Гемам</span>
                        </h1>
                        <p class="text-lg md:text-xl text-slate-500 mb-12 max-w-xl mx-auto lg:mx-0 font-medium leading-relaxed">Безопасное пополнение Brawl Stars через TON. Низкие комиссии и автоматическое зачисление по Player ID.</p>
                        <div class="flex flex-col sm:flex-row items-center justify-center lg:justify-start space-y-4 sm:space-y-0 sm:space-x-6">
                            <button onclick="router.navigate('home', 'shop')" class="w-full sm:w-auto bg-slate-900 text-white px-10 py-5 rounded-2xl font-extrabold text-lg hover:bg-purple-700 transition shadow-2xl hover:-translate-y-1">В магазин</button>
                            <button class="w-full sm:w-auto bg-white border-2 border-slate-100 text-slate-600 px-10 py-5 rounded-2xl font-extrabold text-lg hover:border-purple-200 transition">Инструкция</button>
                        </div>
                    </div>
                    <div class="lg:w-5/12 relative group">
                        <div class="absolute inset-0 bg-purple-400 blur-[120px] opacity-20 rounded-full animate-pulse-slow"></div>
                        <div class="relative w-full aspect-square animate-gradient rounded-[3rem] p-1 shadow-2xl transform rotate-2 group-hover:rotate-0 transition duration-1000">
                           <div class="bg-white/10 w-full h-full rounded-[2.8rem] backdrop-blur-2xl border border-white/40 flex items-center justify-center overflow-hidden">
                              <img src="images/hero_gems.webp" width="400" height="400" class="w-4/5 h-4/5 object-contain drop-shadow-[0_25px_50px_rgba(0,0,0,0.35)]" onerror="this.src='https://placehold.co/400x400/6d28d9/white?text=GEMS';">
                           </div>
                        </div>
                    </div>
                </div>
            </section>

            <section id="shop" class="max-w-7xl mx-auto px-4 py-24 scroll-mt-24">
                <div class="text-center mb-16">
                    <h2 class="text-4xl md:text-5xl font-black text-slate-900 mb-6">Выберите количество</h2>
                    <p class="text-slate-500 font-medium text-lg">Автоматическая доставка в течение 5 минут</p>
                </div>
                
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 mb-24">
                    ${this.catalog.gems.map(g => `
                        <div class="bg-white rounded-[2.5rem] p-10 shadow-sm border border-slate-100 hover:shadow-2xl hover:-translate-y-2 transition-all duration-500 group">
                            <div class="mb-10 flex justify-center items-center bg-slate-50 h-52 rounded-[2rem] relative overflow-hidden">
                                <div class="absolute inset-0 bg-gradient-to-br from-purple-500/5 to-blue-500/5"></div>
                                <img src="${g.img}" alt="${g.amount} Гемов" class="w-auto h-36 object-contain group-hover:scale-110 transition duration-700 relative z-10" onerror="this.src='https://placehold.co/200x200/6d28d9/white?text=GEMS';">
                            </div>
                            <button onclick="createOrder('${g.amount} Гемов','${g.price}')"
                            <p class="text-slate-400 font-bold text-sm mb-10 uppercase tracking-widest">Instant Delivery</p>
                            <div class="flex justify-between items-center">
                                <span class="text-3xl font-black text-purple-600">${g.price} <span class="text-base text-slate-400">TON</span></span>
                                <button onclick="router.buyProduct('${g.id}', '${g.price}', '${g.amount} Гемов')" class="w-full mt-4 bg-gradient-to-r from-purple-600 to-blue-500 text-white font-bold py-3 rounded-xl hover:scale-105 hover:shadow-lg hover:shadow-purple-500/40 active:scale-95 transition-all duration-300">Купить</button>
                            </div>
                        </div>
                    `).join('')}
                </div>

                <div class="bg-gradient-to-br from-indigo-950 to-slate-950 rounded-[3.5rem] p-12 lg:p-24 relative overflow-hidden shadow-2xl border border-white/5">
                    <div class="absolute -top-20 -right-20 w-96 h-96 bg-purple-500/20 blur-[100px] rounded-full"></div>
                    <div class="relative z-10 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
                        <div>
                            <span class="bg-yellow-500 text-black px-4 py-1.5 rounded-full font-black text-[10px] uppercase tracking-widest mb-6 inline-block">Premium Offer</span>
                            <h2 class="text-5xl lg:text-7xl font-black text-white mb-8">Brawl Pass Plus</h2>
                            <p class="text-indigo-100/70 text-xl mb-12 leading-relaxed">Эксклюзивные скины, дополнительный прогресс и доступ к уникальным бойцам сезона. Активация по Player ID.</p>
                            <div class="flex items-center space-x-6 mb-12">
                                <div class="bg-white/5 p-6 rounded-3xl backdrop-blur-md border border-white/10">
                                    <span class="block text-white font-black text-4xl">14.99 TON</span>
                                </div>
                                <div class="text-indigo-300 font-bold text-sm uppercase tracking-[0.2em] leading-tight">Лучший выбор<br>игроков</div>

                        </div>
                        <div class="flex justify-center group">
                            <img src="images/bp_plus_big.webp" class="max-h-96 drop-shadow-[0_35px_60px_rgba(0,0,0,0.5)] group-hover:scale-105 transition duration-700" onerror="this.src='https://placehold.co/400x400/indigo/white?text=BRAWL+PASS';">
                        </div>
                    </div>
                </div>
            </section>

            <section id="reviews-feed" class="py-24 bg-slate-50 border-y border-slate-100 scroll-mt-24">
                <div class="max-w-7xl mx-auto px-4 text-center mb-16">
                    <h2 class="text-4xl font-black text-slate-900 mb-4">Отзывы сообщества</h2>

                <div class="max-w-7xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-8">
                    ${reviewsHtml}

    },

    renderAuth(mode) {
        const isLogin = mode === 'login';
        const container = document.getElementById('view-container');
        container.innerHTML = `
            <div class="max-w-md mx-auto py-32 px-4">
                <div class="bg-white rounded-[3rem] p-10 md:p-14 shadow-2xl border border-slate-100 relative">
                    <div class="text-center mb-12">
                        <h2 class="text-4xl font-black mb-3">${isLogin ? 'Вход' : 'Регистрация'}</h2>
                        <p class="text-slate-500 font-medium">${isLogin ? 'Рады видеть вас снова' : 'Создайте аккаунт за секунды'}</p>
                    </div>
                    <form onsubmit="router.handleAuth(event, '${mode}')" class="space-y-6" id="auth-form">

                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Email Адрес</label>

                        </div>
                        <div>
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-widest mb-3 ml-1">Пароль</label>
                            <input type="password" id="auth-pass" required class="w-full rounded-2xl border-slate-100 bg-slate-50 focus:bg-white focus:ring-4 focus:ring-purple-500/10 focus:border-purple-500 px-6 py-4.5 font-bold transition-all outline-none">
                        </div>
                        <div id="auth-error" class="hidden text-red-500 text-xs font-bold bg-red-50 p-4 rounded-2xl border border-red-100 animate-pulse"></div>
                        <button type="submit" id="auth-btn" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black text-lg hover:bg-purple-600 transition shadow-xl mt-4 flex items-center justify-center space-x-3 group">
                            <span id="auth-btn-text">${isLogin ? 'Войти в аккаунт' : 'Создать аккаунт'}</span>
                            <div id="auth-loader" class="loader hidden"></div>
                            <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition-transform" id="auth-btn-icon"></i>
                        </button>
                    </form>

<!-- MoltenStore 3.0 Enhancements -->
<style>
.toast{position:fixed;bottom:20px;right:20px;background:#111827;color:#fff;
padding:12px 16px;border-radius:10px;box-shadow:0 10px 25px rgba(0,0,0,.4);
opacity:0;transform:translateY(20px);transition:.3s}
.toast.show{opacity:1;transform:translateY(0)}
.status-pill{padding:4px 10px;border-radius:999px;font-size:12px}
.status-wait{background:#f59e0b}
.status-paid{background:#22c55e}
.status-work{background:#3b82f6}
.status-done{background:#a855f7}
</style>

<div id="toast" class="toast">Notification</div>

<script>
function showToast(t){
 const el=document.getElementById('toast');
 el.innerText=t;
 el.classList.add('show');
 setTimeout(()=>el.classList.remove('show'),3000);
}

function renderOrderStatus(status){
 if(status==='ожидает') return '<span class="status-pill status-wait">ожидает</span>';
 if(status==='оплачено') return '<span class="status-pill status-paid">оплачено</span>';
 if(status==='в работе') return '<span class="status-pill status-work">в работе</span>';
 if(status==='готово') return '<span class="status-pill status-done">готово</span>';
 return status;
}

// hook existing order rendering if present
if(window.renderOrders){
 const oldRender=window.renderOrders;
 window.renderOrders=function(list){
   const html=oldRender(list);
   return html.replace(/ожидает|оплачено|в работе|готово/g, m=>renderOrderStatus(m));
 }
}

document.addEventListener('DOMContentLoaded',()=>{
 showToast('MoltenStore 3.0 загружен');
});
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

function createOrder(product, price){

const id = "ORD-" + Date.now();

const order = {
id:id,
product:product,
price:price,
status:"ожидает"
};

orders.push(order);

localStorage.setItem("orders", JSON.stringify(orders));

showOrders();

alert("Заказ создан: " + id);

}

function showOrders(){

let html="";

orders.forEach(o=>{

html+=`
<div class="order-card">

<div><b>${o.product}</b></div>

<div>${o.price} TON</div>

<div class="status">${o.status}</div>

</div>
`;

});

document.getElementById("orders").innerHTML = html;

}</script>
